<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shayan POS - Professional Billing & Stock</title>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<style>
/* --- ALL ORIGINAL STYLES REMAIN SAME --- */
:root {
    --accent: #6366f1;
    --bg: #f8fafc;
    --glass: rgba(255, 255, 255, 0.95);
    --text: #0f172a;
    --blue-btn: #2563eb;
}

body { font-family: 'Inter', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding: 10px; }
.content-wrapper { width: 95%; max-width: 500px; margin: 40px auto; }
h1 { text-align: center; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.step-card { background: var(--glass); padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
input, select { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; box-sizing: border-box; outline: none; }

.btn-blue { width: 100%; padding: 12px; border-radius: 6px; border: none; background: var(--blue-btn); color: white; font-size: 15px; font-weight: 500; cursor: pointer; margin: 5px 0; transition: 0.2s; }
.btn-primary { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }

/* New Style for Shop Header Hide */
.shop-header-card { position: relative; background: #fff; padding: 15px; border-radius: 15px; border: 1px dashed var(--accent); margin-bottom: 20px; }
.edit-gear { position: absolute; top: 10px; right: 10px; cursor: pointer; font-size: 20px; z-index: 100; }

/* Rest of the original styles */
.billing-ui-container { max-width: 800px; margin: auto; background: #ffffff; padding: 5px; }
table { width: 100%; margin-top: 10px; border-collapse: collapse; }
th, td { border: 1px solid #666; padding: 8px; font-size: 14px; text-align: center; }
.hidden { display: none !important; }
.status-badge { display: inline-block; padding: 5px 12px; background: #dcfce7; color: #166534; border-radius: 10px; font-size: 12px; font-weight: 700; }
.table-wrapper { overflow-x: auto; width: 100%; margin-bottom: 10px; }
.current-total-box { background: #f0f4ff; border: 1px solid #6366f1; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: center; font-size: 20px; font-weight: bold; }
.sale-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
.sale-card { background: #f1f5f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #e2e8f0; }
</style>
</head>
<body>

<script>
    // --- FIREBASE CONNECTION ---
    const firebaseConfig = {
        apiKey: "AIzaSyDzUtrDvUpxqsrwZ4O-SGJo6HnGdH89ewU",
        authDomain: "shayan-smart-pos.firebaseapp.com",
        projectId: "shayan-smart-pos",
        storageBucket: "shayan-smart-pos.firebasestorage.app",
        messagingSenderId: "1097871545066",
        appId: "1:1097871545066:web:20b112b0ae98ac2264bd93",
        databaseURL: "https://shayan-smart-pos-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>

<div id="auth-flow" class="content-wrapper">
    <h1>Shayan Smart Billing</h1>
    
    <div id="step-mpin-login" class="step-card hidden">
        <h3>Login</h3>
        <input id="inputMPIN" type="password" maxlength="4" placeholder="Enter 4-Digit MPIN" style="text-align:center;">
        <button class="btn-primary" onclick="loginWithMPIN()">Unlock</button>
    </div>

    <div id="step-reg" class="step-card">
        <h3>User Verification</h3>
        <input id="uName" placeholder="Business Owner Name" oninput="checkAdminFlow(this.value)">
        <input id="uAddr" placeholder="Shop Address">
        <input id="uMob" type="number" placeholder="WhatsApp Number">
        <button class="btn-primary" onclick="requestActivation()">Verify & Request ID</button>
    </div>

    <div id="step-lock" class="step-card hidden">
        <div style="background:#fef3c7; color:#b45309; padding:10px; border-radius:10px; font-size:12px; font-weight:700;">Awaiting Approval</div>
        <input id="inputApprovalID" placeholder="Enter Approval ID" style="text-align:center;">
        <button class="btn-primary" onclick="verifyApprovalID()">Verify ID</button>
    </div>

    <div id="step-plans" class="step-card hidden">
        <h3>Choose Your Plan</h3>
        <button class="btn-primary" onclick="selectPlan('trial', 7)">7 Days Free Trial</button>
        <button class="btn-primary" style="background:#22c55e;" onclick="selectPlan('premium', 365)">1 Year Premium</button>
    </div>
</div>

<div id="main-billing" class="billing-ui-container hidden">
    <div style="text-align:right;"><span id="timer-badge" class="status-badge"></span></div>
    
    <div class="shop-header-card">
        <div class="edit-gear" onclick="toggleShopEdit()">⚙️</div>
        
        <div id="shop-display" class="hidden" style="text-align:center;">
            <h2 id="disp-name" style="margin:0; color:var(--accent);"></h2>
            <p id="disp-addr" style="margin:5px 0; font-size:12px;"></p>
            <p id="disp-phone" style="margin:0; font-weight:bold;"></p>
        </div>

        <div id="shop-form">
            <h2>Dukan ki Details</h2>
            <input id="shop" placeholder="Shop Name">
            <input id="address" placeholder="Address">
            <input id="phone" placeholder="Phone">
            <input id="upiId" placeholder="Your UPI ID">
            <button id="saveShopBtn" class="btn-blue">Save & Hide Details</button>
        </div>
    </div>

    <input id="customer" placeholder="Customer Name">
    <input id="productSearch" placeholder="Search Product">
    <select id="productDropdown"></select>
    <input id="qty" type="number" placeholder="Qty">
    <input id="price" type="number" placeholder="Price">
    <button id="addItemBtn" class="btn-blue">Add Item</button>

    <div class="table-wrapper">
        <table id="table">
            <tr><th>No</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th></tr>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="current-total-box">Current Total: ₹<span id="liveCurrentTotal">0</span></div>
    
    <button id="generateBillBtn" class="btn-blue" style="background:#2563eb;">Generate Bill</button>
    <button id="printBillBtn" class="btn-blue">Print Receipt</button>
    <div id="bill" class="bill"></div>
</div>

<script>
// --- ORIGINAL LOGIC WITH FIREBASE INJECTION ---

function requestActivation() {
    let name = document.getElementById("uName").value, mob = document.getElementById("uMob").value;
    if(!name || mob.length < 10) return alert("Sahi info bhariye");
    
    // Firebase me data bhej rahe hain
    db.ref('users/' + mob).set({ name, mob, status: "pending", suspended: false }).then(() => {
        localStorage.setItem("current_user_mob", mob);
        document.getElementById("step-reg").classList.add("hidden");
        document.getElementById("step-lock").classList.remove("hidden");
    });
}

function verifyApprovalID() {
    let mob = localStorage.getItem("current_user_mob");
    let inputID = document.getElementById("inputApprovalID").value;
    db.ref('users/' + mob).once('value', (snap) => {
        if(snap.val() && snap.val().appID === inputID) {
            document.getElementById("step-lock").classList.add("hidden");
            document.getElementById("step-plans").classList.remove("hidden");
        } else { alert("ID Match nahi hui!"); }
    });
}

function selectPlan(type, days) {
    let expiry = new Date().getTime() + (days * 24 * 60 * 60 * 1000);
    localStorage.setItem("shayan_auth", JSON.stringify({active:true, exp:expiry}));
    localStorage.setItem("user_mpin", "1234"); // Default MPIN
    location.reload();
}

function loginWithMPIN() {
    let pin = document.getElementById("inputMPIN").value;
    if(pin === localStorage.getItem("user_mpin")) {
        let auth = JSON.parse(localStorage.getItem("shayan_auth"));
        auth.active = true;
        localStorage.setItem("shayan_auth", JSON.stringify(auth));
        location.reload();
    } else { alert("Wrong MPIN"); }
}

// --- SHOP HIDE/SHOW LOGIC ---
function toggleShopEdit() {
    document.getElementById("shop-form").classList.toggle("hidden");
    document.getElementById("shop-display").classList.toggle("hidden");
}

function loadShopDisplay() {
    const s = localStorage.getItem("shop"), a = localStorage.getItem("address"), p = localStorage.getItem("phone");
    if(s && p) {
        document.getElementById("shop-form").classList.add("hidden");
        document.getElementById("shop-display").classList.remove("hidden");
        document.getElementById("disp-name").innerText = s;
        document.getElementById("disp-addr").innerText = a;
        document.getElementById("disp-phone").innerText = "Phone: " + p;
        document.getElementById("shop").value = s;
        document.getElementById("address").value = a;
        document.getElementById("phone").value = p;
    }
}

// --- INITIALIZE ON LOAD ---
window.onload = function() {
    let auth = JSON.parse(localStorage.getItem("shayan_auth"));
    if(auth && auth.active) {
        document.getElementById("auth-flow").classList.add("hidden");
        document.getElementById("main-billing").classList.remove("hidden");
        loadShopDisplay();
        initBillingSystem(); // Aapka original billing function
    } else if(auth && !auth.active) {
        document.getElementById("step-reg").classList.add("hidden");
        document.getElementById("step-mpin-login").classList.remove("hidden");
    }
};

// --- REST OF YOUR ORIGINAL BILLING FUNCTIONS ---
// (Yahan aapka addItem, generateBill, printBill ka saara code rahega)
function initBillingSystem() {
    const saveBtn = document.getElementById("saveShopBtn");
    saveBtn.onclick = function() {
        localStorage.setItem("shop", document.getElementById("shop").value);
        localStorage.setItem("address", document.getElementById("address").value);
        localStorage.setItem("phone", document.getElementById("phone").value);
        localStorage.setItem("upiId", document.getElementById("upiId").value);
        alert("Saved!");
        loadShopDisplay();
    };
    
    // ... baki billing functions wahi rahenge jo aapne diye hain ...
}
</script>
</body>
</html>
