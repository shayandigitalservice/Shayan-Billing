<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayan Smart POS - Master</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        /* Aapka Purana Design aur Color */
        :root { --accent: #6366f1; --bg: #f8fafc; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .hidden { display: none !important; }
        
        /* Shop Header Card */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .edit-gear { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 20px; opacity: 0.7; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; margin-top: 5px; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: #10b981; }
        .btn-red { background: #ef4444; }

        /* Admin Panel Overlay */
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: none; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 13px; }
        .total-box { background: #eef2ff; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; color: var(--accent); margin: 15px 0; }
    </style>
</head>
<body>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDzUtrDvUpxqsrwZ4O-SGJo6HnGdH89ewU",
        authDomain: "shayan-smart-pos.firebaseapp.com",
        projectId: "shayan-smart-pos",
        storageBucket: "shayan-smart-pos.firebasestorage.app",
        messagingSenderId: "1097871545066",
        appId: "1:1097871545066:web:20b112b0ae98ac2264bd93",
        databaseURL: "https://shayan-smart-pos-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
</script>

<div id="auth-section" class="card" style="max-width:400px; margin: 50px auto;">
    <h2 style="text-align:center;">Shayan Smart POS</h2>
    <div id="reg-form">
        <input id="regName" placeholder="Owner Name" oninput="checkAdmin(this.value)">
        <input id="regMob" type="number" placeholder="Mobile Number">
        <button class="btn btn-blue" onclick="handleRegister()">Register & Request Access</button>
    </div>
    <div id="lock-form" class="hidden">
        <p style="text-align:center; color:orange;">Account Pending Approval...</p>
        <input id="unlockID" placeholder="Enter Approval ID" style="text-align:center;">
        <button class="btn btn-blue" onclick="handleUnlock()">Activate App</button>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between;">
        <h2>🛠 Admin Control</h2>
        <button onclick="closeAdmin()" class="btn-red" style="width:auto; padding:5px 15px;">Close</button>
    </div>
    <div class="card" style="background:#f1f5f9;">
        <input id="targetMob" placeholder="Enter User Mobile">
        <button class="btn btn-blue" onclick="approveUser()">Approve & Send ID via WA</button>
        <button class="btn" style="background:orange;" onclick="suspendUser(true)">Suspend (Block)</button>
        <button class="btn btn-green" onclick="suspendUser(false)">Activate (Unblock)</button>
    </div>
    <div id="user-list-area"></div>
</div>

<div id="main-app" class="hidden">
    
    <div class="card">
        <div class="edit-gear" onclick="showShopForm()">⚙️</div>
        
        <div id="shop-display" class="hidden">
            <h2 id="d-name" style="margin:0; color:var(--accent);">Shop Name</h2>
            <p id="d-addr" style="margin:5px 0; font-size:12px;">Address</p>
            <p id="d-phone" style="margin:0; font-weight:bold;">Phone: 000</p>
        </div>

        <div id="shop-entry-form">
            <h3>Shop Details</h3>
            <input id="s-name" placeholder="Shop Name">
            <input id="s-addr" placeholder="Address">
            <input id="s-phone" placeholder="Phone Number">
            <input id="s-upi" placeholder="UPI ID (for QR)">
            <button class="btn btn-blue" onclick="saveShop()">Save & Hide</button>
        </div>
    </div>

    <div class="card">
        <input id="cName" placeholder="Customer Name">
        <div style="display:flex; gap:5px;">
            <input id="pName" placeholder="Item Name" style="flex:2;">
            <input id="pQty" type="number" placeholder="Qty" style="flex:1;">
            <input id="pPrice" type="number" placeholder="Price" style="flex:1;">
        </div>
        <button class="btn btn-green" onclick="addBillItem()">+ Add Item</button>
    </div>

    <div class="card">
        <table>
            <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
            <tbody id="billTable"></tbody>
        </table>
        <div class="total-box">Total: ₹<span id="gTotal">0</span></div>
        <button class="btn btn-blue" onclick="printReceipt()">Print Receipt</button>
        <button class="btn" style="background:#64748b; margin-top:10px;" onclick="alert('Stock System Open')">Manage Stock</button>
    </div>
</div>

<script>
let items = []; let total = 0;

// Admin Password Logic
function checkAdmin(v) {
    if(v === "shayan@master") {
        let p = prompt("Enter Master Key:");
        if(p === "Muksidul#2026") { document.getElementById("admin-panel").style.display="block"; }
    }
}

function closeAdmin() { document.getElementById("admin-panel").style.display="none"; }

// Firebase Functions
function handleRegister() {
    let name = document.getElementById("regName").value;
    let mob = document.getElementById("regMob").value;
    if(!name || mob.length < 10) return alert("Sahi details bhariye");
    db.ref('users/' + mob).set({ name, mob, status: "pending", suspended: false }).then(() => {
        localStorage.setItem("user_mob", mob);
        alert("Request Sent!");
        document.getElementById("reg-form").classList.add("hidden");
        document.getElementById("lock-form").classList.remove("hidden");
    });
}

function handleUnlock() {
    let mob = localStorage.getItem("user_mob");
    let id = document.getElementById("unlockID").value;
    db.ref('users/' + mob).once('value', (s) => {
        if(s.val() && s.val().appID === id) {
            localStorage.setItem("is_active", "true");
            location.reload();
        } else { alert("Wrong ID"); }
    });
}

// Shop Details Hide/Show Logic
function saveShop() {
    let shop = {
        name: document.getElementById("s-name").value,
        addr: document.getElementById("s-addr").value,
        phone: document.getElementById("s-phone").value,
        upi: document.getElementById("s-upi").value
    };
    localStorage.setItem("shop_data", JSON.stringify(shop));
    renderShop();
}

function renderShop() {
    let data = JSON.parse(localStorage.getItem("shop_data"));
    if(data) {
        document.getElementById("shop-entry-form").classList.add("hidden");
        document.getElementById("shop-display").classList.remove("hidden");
        document.getElementById("d-name").innerText = data.name;
        document.getElementById("d-addr").innerText = data.addr;
        document.getElementById("d-phone").innerText = "Phone: " + data.phone;
    }
}
function showShopForm() { document.getElementById("shop-entry-form").classList.toggle("hidden"); }

// Billing Logic
function addBillItem() {
    let n = document.getElementById("pName").value, q = +document.getElementById("pQty").value, p = +document.getElementById("pPrice").value;
    if(!n || !q || !p) return;
    let t = q * p; total += t;
    document.getElementById("billTable").innerHTML += `<tr><td>${n}</td><td>${q}</td><td>${p}</td><td>${t}</td></tr>`;
    document.getElementById("gTotal").innerText = total;
}

function printReceipt() { window.print(); }

// Auth Check on Load
window.onload = () => {
    let mob = localStorage.getItem("user_mob");
    if(mob) {
        db.ref('users/' + mob).on('value', (s) => {
            let u = s.val();
            if(u && u.suspended) { document.body.innerHTML = "<h1>Blocked</h1>"; }
            else if(localStorage.getItem("is_active") === "true") {
                document.getElementById("auth-section").classList.add("hidden");
                document.getElementById("main-app").classList.remove("hidden");
                renderShop();
            }
        });
    }
};

// Admin Commands
function approveUser() {
    let m = document.getElementById("targetMob").value;
    let id = "ID-" + Math.floor(1000 + Math.random()*9000);
    db.ref('users/'+m).update({appID: id, status: 'active'});
    alert("Approved! ID: " + id);
    window.open(`https://wa.me/${m}?text=ID:${id}`);
}
function suspendUser(state) {
    let m = document.getElementById("targetMob").value;
    db.ref('users/'+m).update({suspended: state});
}
</script>
</body>
</html>
